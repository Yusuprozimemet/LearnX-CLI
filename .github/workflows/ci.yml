name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main", "v*-*"]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install "ruff>=0.4"

      - name: Check style
        run: ruff check tutor/

      - name: Check formatting
        run: ruff format --check tutor/
