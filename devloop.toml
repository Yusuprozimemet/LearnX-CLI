# devloop.toml — project config for the learnx_dk.py dev loop
# Edit this file to adapt the loop to a different project.

[project]
name = "LearnX"
docker_image = "learnx-dev"
specs_dir = "specs"
workspace = "/workspace"

[validation]
unit_tests = "python -m pytest tutor/tests/ --ignore=tutor/tests/e2e/ -m 'not slow' -v"
e2e_tests = "python -m pytest tutor/tests/e2e/ -v"
lint = "python -m ruff check tutor/"
format_check = "python -m ruff format --check tutor/"

[review]
agents_dir = ".claude/agents"
review_script = "scripts/run_review.py"
two_phase = true          # set false to skip phase 2 verification

[resilience]
session_timeout_minutes = 30   # kill container after this wall-clock time
idle_timeout_minutes = 5       # kill if no output for this long
rate_limit_wait_minutes = 2    # wait before retrying on rate limit (0 = no retry)
max_retries_per_spec = 1       # max retries per spec on rate limit
rate_limit_patterns = [
    "rate limit exceeded",
    "you've hit your limit",
    "429 too many requests",
    "quota exceeded",
]

# [notify]
# Credentials are NEVER stored here — list the env var name, not the value.
#
# Webhook — receives JSON POST on completion/failure
# webhook_url = "https://hooks.example.com/learnx"
#
# Telegram — reads token and chat_id from the named environment variables
# telegram_token_env = "NOTIFY_TELEGRAM_TOKEN"
# telegram_chat_id_env = "NOTIFY_TELEGRAM_CHAT_ID"
#
# Custom script — receives result JSON on stdin, exit code is ignored
# script = "scripts/notify.sh"
